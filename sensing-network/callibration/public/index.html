<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* Expressive Design System Tokens */
    :root {
      --primary: #db2777;
      --primary-light: #f472b6;
      --primary-dark: #be185d;
      --primary-glow: rgba(219, 39, 119, 0.15);
      --secondary: #2563eb;
      --secondary-light: #60a5fa;
      --secondary-glow: rgba(37, 99, 235, 0.15);
      --success: #16A34A;
      --warning: #D97706;
      --danger: #DC2626;
      --surface: #FFFFFF;
      --surface-raised: #F9FAFB;
      --surface-inset: #F3F4F6;
      --border: #E5E7EB;
      --border-strong: #D1D5DB;
      --text: #111827;
      --text-secondary: #6B7280;
      --text-tertiary: #9CA3AF;
      --space-1: 4px;
      --space-2: 8px;
      --space-3: 12px;
      --space-4: 16px;
      --space-6: 24px;
      --space-8: 32px;
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --radius-xl: 24px;
    }

    /* Reset */
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
    }

    body {
      background: var(--surface);
      color: var(--text);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 14px;
      line-height: 1.6;
      padding: var(--space-6);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Header */
    .app-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: var(--space-6);
      flex-shrink: 0;
    }

    .app-header h1 {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: var(--text);
    }

    .app-header h1 span {
      color: var(--primary);
    }

    .header-status {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      font-size: 12px;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      font-weight: 500;
      background: var(--surface-inset);
      padding: var(--space-2) var(--space-3);
      border-radius: 100px;
      border: 1px solid var(--border);
    }

    .live-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background-color: var(--text-tertiary);
      transition: all 0.4s ease;
    }

    .live-dot.active {
      background-color: var(--success);
      box-shadow: 0 0 0 3px rgba(22, 163, 74, 0.2);
      animation: pulse 2s ease infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.7; transform: scale(1.3); }
    }

    /* Main Grid */
    .main {
      display: grid;
      grid-template-columns: 1.4fr 0.6fr;
      gap: var(--space-6);
      flex: 1;
      min-height: 0;
    }

    @media (max-width: 1024px) {
      .main { grid-template-columns: 1fr; }
    }

    /* Cards */
    .card {
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: var(--radius-lg);
      padding: var(--space-6);
      display: flex;
      flex-direction: column;
      min-height: 0;
      position: relative;
      transition: border-color 0.2s ease;
    }

    .card:hover {
      border-color: var(--border-strong);
    }

    .card--step1 {
      border-top: 3px solid var(--primary);
    }

    .card--step2 {
      border-top: 3px solid var(--secondary);
      opacity: 0.4;
      pointer-events: none;
      transition: opacity 0.4s ease;
    }

    .card--step2.is-active {
      opacity: 1;
      pointer-events: auto;
    }

    /* Card Header */
    .card-header {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      margin-bottom: var(--space-3);
    }

    .card-step {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--surface);
      background: var(--primary);
      padding: 2px 10px;
      border-radius: 100px;
      line-height: 1.8;
    }

    .card--step2 .card-step {
      background: var(--secondary);
    }

    .card-title {
      font-size: 18px;
      font-weight: 600;
      color: var(--text);
    }

    .card-divider {
      height: 1px;
      background: var(--border);
      margin-bottom: var(--space-4);
    }

    /* Controls */
    .control-group {
      margin-bottom: var(--space-4);
    }

    .input-wrapper {
      display: flex;
      gap: var(--space-3);
      align-items: center;
      flex-wrap: wrap;
    }

    label {
      font-size: 12px;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: 500;
    }

    input[type="number"] {
      background: var(--surface-inset);
      border: 2px solid var(--border);
      color: var(--text);
      padding: var(--space-2) var(--space-3);
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-family: 'IBM Plex Mono', monospace;
      font-weight: 600;
      width: 90px;
      transition: all 0.2s ease;
    }

    input[type="number"]:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--primary-glow);
    }

    /* Buttons */
    .btn {
      padding: var(--space-2) var(--space-4);
      border: 2px solid transparent;
      border-radius: var(--radius-sm);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s ease;
      font-family: 'IBM Plex Mono', monospace;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .btn--primary {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
    }

    .btn--primary:hover {
      background: var(--primary-dark);
      border-color: var(--primary-dark);
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(219, 39, 119, 0.3);
    }

    .btn--primary:active {
      transform: translateY(0);
    }

    .btn--primary.is-active {
      background: transparent;
      color: var(--primary);
      border-color: var(--primary);
    }

    .btn--primary.is-disabled {
      background: var(--surface-inset);
      color: var(--text-tertiary);
      border-color: var(--border);
      opacity: 0.6;
      cursor: not-allowed;
    }

    .btn--primary.is-disabled:hover {
      transform: none;
      box-shadow: none;
    }

    .card--step2 .btn--primary {
      background: var(--secondary);
      border-color: var(--secondary);
    }

    .card--step2 .btn--primary:hover {
      background: #1d4ed8;
      border-color: #1d4ed8;
      box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
    }

    .card--step2 .btn--primary.is-active {
      background: transparent;
      color: var(--secondary);
      border-color: var(--secondary);
    }

    .card--step2 .btn--primary.is-disabled {
      background: var(--surface-inset);
      color: var(--text-tertiary);
      border-color: var(--border);
    }

    /* Status */
    .status-text {
      color: var(--text-secondary);
      font-size: 13px;
      margin-bottom: 0;
      min-height: 0;
    }

    .status-text.active {
      margin-bottom: var(--space-3);
      min-height: 1.5rem;
      color: var(--primary);
      font-weight: 500;
    }

    /* Progress */
    .progress-section {
      margin: var(--space-2) 0;
      display: flex;
      align-items: center;
      gap: var(--space-3);
    }

    .progress-label {
      font-size: 11px;
      color: var(--text-tertiary);
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: 500;
      white-space: nowrap;
    }

    .progress-bar-container {
      flex: 1;
      height: 6px;
      display: flex;
      gap: 3px;
      align-items: center;
    }

    .progress-bar-segment {
      flex: 1;
      height: 6px;
      background: var(--surface-inset);
      border-radius: 100px;
      border: 1px solid var(--border);
      transition: all 0.3s ease;
    }

    .progress-bar-segment.filled {
      background: linear-gradient(90deg, var(--primary), var(--primary-light));
      border-color: var(--primary);
      box-shadow: 0 0 8px var(--primary-glow);
    }

    /* Chart */
    #vis {
      background: var(--surface-inset);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: var(--space-4);
      flex: 1;
      min-height: 0;
      overflow: hidden;
      margin-top: var(--space-2);
      position: relative;
    }

    #vis canvas {
      max-height: 100%;
    }

    /* Node Display */
    .node-display-container {
      display: flex;
      flex-direction: column;
      gap: var(--space-3);
      flex: 1;
      min-height: 0;
    }

    .node-status {
      font-size: 11px;
      color: var(--text-tertiary);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      font-weight: 500;
    }

    #selectedNode {
      display: flex;
      align-items: center;
      justify-content: center;
      flex: 1;
      min-height: 0;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 72px;
      font-weight: 700;
      color: var(--text-tertiary);
      text-align: center;
      transition: all 0.3s ease;
      padding: var(--space-6);
      border: 2px dashed var(--border);
      border-radius: var(--radius-md);
      background: var(--surface-inset);
    }

    #selectedNode.is-active {
      color: var(--secondary);
      border-style: solid;
      border-color: var(--secondary);
      background: linear-gradient(135deg, rgba(37, 99, 235, 0.04), rgba(219, 39, 119, 0.04));
      box-shadow: 0 0 0 4px var(--secondary-glow);
      transform: scale(1.02);
    }

    /* Responsive */
    @media (max-width: 768px) {
      body { padding: var(--space-4); }
      .app-header h1 { font-size: 18px; }
      .card { padding: var(--space-4); }
      #selectedNode { font-size: 48px; }
    }
  </style>

  <script src="./js/libraries/socket.io@4.7.1"></script>
  <script src="./js/libraries/vega@5.25.0"></script>
  <script src="./js/libraries/vega-lite@5.12.0"></script>
  <script src="./js/libraries/vega-embed@6.22.1"></script>
</head>

<body>
  <header class="app-header">
    <h1><span>//</span> Calibration Tool</h1>
    <div class="header-status">
      <span>Status</span>
      <div id="liveDot" class="live-dot"></div>
    </div>
  </header>

  <main class="main">
    <!-- Step 1: Collect & Process Data -->
    <section class="card card--step1">
      <div class="card-header">
        <div class="card-step">Step 01</div>
        <div class="card-title">Data Collection</div>
      </div>

      <div class="card-divider"></div>

      <div class="control-group">
        <div class="input-wrapper">
          <label for="nNodesInput">Nodes</label>
          <input id="nNodesInput" name="nNodes" type="number" value="20" min="1" max="1000">
          <button id="collectionStartButton" class="btn btn--primary">Start Capture</button>
        </div>
      </div>

      <div class="status-text" id="currentCollectingNode"></div>

      <div class="progress-section">
        <div class="progress-label">Progress</div>
        <div class="progress-bar-container" id="progressBarsContainer"></div>
      </div>

      <div id="vis"></div>
    </section>

    <!-- Step 2: Node Selection Demo -->
    <section class="card card--step2">
      <div class="card-header">
        <div class="card-step">Step 02</div>
        <div class="card-title">Node Detection</div>
      </div>

      <div class="card-divider"></div>

      <div style="margin-bottom: var(--space-4);">
        <button id="demoStartButton" class="btn btn--primary is-disabled" disabled>Start Detection</button>
      </div>

      <div class="node-display-container">
        <div class="node-status">Detected Node</div>
        <div id="selectedNode">—</div>
      </div>
    </section>
  </main>

  <script src="./js/main.js" type="module"></script>
</body>

</html>
